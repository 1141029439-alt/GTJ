<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北京高铁建科技发展有限公司</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #f5f5f5; 
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        .header {
            background: #fff;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
        }
        .header h1 { 
            font-size: 18px; 
            color: #1a1a1a; 
            font-weight: 600;
        }
        .download-bar {
            background: #fff;
            padding: 16px;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
        }
        .download-btn {
            display: inline-block;
            background: #c41e24;
            color: #fff;
            padding: 12px 32px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: background 0.2s;
        }
        .download-btn:hover {
            background: #a3181d;
        }
        .pdf-container {
            width: 100%;
            height: calc(100vh - 140px);
            background: #fff;
        }
        embed {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>北京高铁建科技发展有限公司</h1>
    </div>
    
    <div class="download-bar">
        <a href="GTJ-2701 沥青无核密度仪.pdf" download class="download-btn">📥 下载 PDF 文件</a>
    </div>
    
    <div class="pdf-container">
        <embed src="GTJ-2701 沥青无核密度仪.pdf" type="application/pdf">
    </div>
</body>
</html>
